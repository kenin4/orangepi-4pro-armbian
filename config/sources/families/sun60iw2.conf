# Write u-boot to image files during build, but skip physical devices
write_uboot_platform() {
    local BOOTLOADER="$1"
    local DEVICE="$2"
    
    # For image files, write u-boot. For physical devices, skip.
    if [[ -f "${DEVICE}" ]]; then
        # This is an image file (.img), write u-boot to it
        # sun60iw2 (Allwinner A733) uses standard offset of 8KB (sector 16)
        display_alert "Writing u-boot to image" "${DEVICE}" "info"
        
        if [[ -f "${BOOTLOADER}/u-boot-sunxi-with-spl.bin" ]]; then
            dd if="${BOOTLOADER}/u-boot-sunxi-with-spl.bin" of="${DEVICE}" bs=1024 seek=8 conv=notrunc,fsync
        else
            display_alert "U-boot binary not found" "${BOOTLOADER}/u-boot-sunxi-with-spl.bin" "warn"
            return 1
        fi
    else
        # This is a physical device, don't touch it
        display_alert "Skipping u-boot write on physical device" "${DEVICE}" "info"
        return 0
    fi
}
