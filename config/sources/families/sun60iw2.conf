# Write u-boot to image build target.
# During image creation DEVICE is typically a /dev/loopX block device, not a regular file.
write_uboot_platform() {
    local BOOTLOADER="$1"
    local DEVICE="$2"

    # Preferred bootloader artifacts from AW2501 vendor package.
    if [[ -f "${BOOTLOADER}/boot0_sdcard.bin" && -f "${BOOTLOADER}/boot_package.fex" ]]; then
        display_alert "Writing vendor u-boot blobs" "${DEVICE}" "info"
        dd conv=notrunc,fsync status=none if="${BOOTLOADER}/boot0_sdcard.bin" of="${DEVICE}" bs=512 seek=256
        if [[ -f "${BOOTLOADER}/boot0_ufs.bin" ]]; then
            dd conv=notrunc,fsync status=none if="${BOOTLOADER}/boot0_ufs.bin" of="${DEVICE}" bs=512 seek=2064
        fi
        dd conv=notrunc,fsync status=none if="${BOOTLOADER}/boot_package.fex" of="${DEVICE}" bs=512 seek=24576
        sync "${DEVICE}"
        return 0
    fi

    # Fallback for standard sunxi u-boot package layout.
    if [[ -f "${BOOTLOADER}/u-boot-sunxi-with-spl.bin" ]]; then
        display_alert "Writing upstream u-boot-sunxi-with-spl.bin" "${DEVICE}" "info"
        dd if=/dev/zero of="${DEVICE}" bs=1k count=1023 seek=1 status=noxfer > /dev/null 2>&1
        dd if="${BOOTLOADER}/u-boot-sunxi-with-spl.bin" of="${DEVICE}" bs=1024 seek=8 conv=notrunc,fsync
        return 0
    fi

    display_alert "U-boot binaries not found" "${BOOTLOADER}" "err"
    return 1
}

function build_custom_uboot() {
    local local_blob_dir="${SRC}/packages/blobs/sunxi/sun60iw2"
    local local_blob
    local_blob="$(ls "${local_blob_dir}"/u-boot-aw2501*.deb 2>/dev/null | head -n 1 || true)"

    if [[ -n "${local_blob}" && -f "${local_blob}" ]]; then
        display_alert "Using local Radxa U-Boot blob" "$(basename "${local_blob}")" "info"
        DEB_VENDOR_BLOB="${local_blob}"
        DOWNLOAD_DIR=""
    else
        display_alert "Fetching latest Radxa U-Boot blob" "u-boot-aw2501" "info"
        local api_url latest_version download_url
        api_url="https://api.github.com/repos/radxa-pkg/u-boot-aw2501/releases/latest"
        latest_version="$(curl -fsSL "${api_url}" | jq -r '.tag_name')"
        [[ -z "${latest_version}" || "${latest_version}" == "null" ]] && exit_with_error "Could not determine latest u-boot-aw2501 release"

        download_url="https://github.com/radxa-pkg/u-boot-aw2501/releases/download/${latest_version}/u-boot-aw2501_${latest_version}_all.deb"
        DOWNLOAD_DIR="$(mktemp -d)"
        DEB_VENDOR_BLOB="${DOWNLOAD_DIR}/u-boot-aw2501_${latest_version}_all.deb"
        wget -q -O "${DEB_VENDOR_BLOB}" "${download_url}"
    fi

    [[ -z "${uboottempdir:-}" ]] && exit_with_error "uboottempdir is not set by caller"
    [[ -z "${uboot_name:-}" ]] && exit_with_error "uboot_name is not set by caller"

    local vendortmp srcdir
    vendortmp="$(mktemp -d)"
    (cd "${vendortmp}" && dpkg-deb -x "${DEB_VENDOR_BLOB}" .) || {
        rm -rf "${vendortmp}" ${DOWNLOAD_DIR:+"${DOWNLOAD_DIR}"}
        exit_with_error "Failed to extract vendor .deb: ${DEB_VENDOR_BLOB}"
    }

    mkdir -p "${uboottempdir}/usr/lib/${uboot_name}"
    if [[ -d "${vendortmp}/usr/lib/u-boot/${BOARD}" ]]; then
        srcdir="${vendortmp}/usr/lib/u-boot/${BOARD}"
    else
        # Fallback: vendor packages may use different board dir naming.
        srcdir="$(find "${vendortmp}/usr/lib/u-boot" -mindepth 1 -maxdepth 3 -type d \
            -exec test -f '{}/boot0_sdcard.bin' \; \
            -exec test -f '{}/boot_package.fex' \; -print -quit 2>/dev/null || true)"
    fi

    if [[ -z "${srcdir}" || ! -d "${srcdir}" ]]; then
        display_alert "Vendor package contents (debug)" "listing candidate u-boot directories" "warn"
        find "${vendortmp}/usr/lib/u-boot" -mindepth 1 -maxdepth 4 -type d -print 2>/dev/null || true
        rm -rf "${vendortmp}" ${DOWNLOAD_DIR:+"${DOWNLOAD_DIR}"}
        exit_with_error "Vendor package layout not found for board: ${BOARD}"
    fi

    local required_files=("boot0_sdcard.bin" "boot_package.fex")
    local optional_files=("boot0_ufs.bin")
    local f
    for f in "${required_files[@]}"; do
        [[ -f "${srcdir}/${f}" ]] || exit_with_error "Required vendor boot file missing: ${srcdir}/${f}"
        cp -v "${srcdir}/${f}" "${uboottempdir}/usr/lib/${uboot_name}/"
    done
    for f in "${optional_files[@]}"; do
        [[ -f "${srcdir}/${f}" ]] && cp -v "${srcdir}/${f}" "${uboottempdir}/usr/lib/${uboot_name}/"
    done

    rm -rf "${vendortmp}" ${DOWNLOAD_DIR:+"${DOWNLOAD_DIR}"}

    # Skip regular mainline u-boot compilation (defconfig is not available upstream for this board yet).
    declare -g EXTENSION_BUILT_UBOOT="yes"
    return 0
}
