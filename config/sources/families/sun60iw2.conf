#    dd if="${BOOTLOADER}/u-boot-sunxi-with-spl.bin" \
#       of="${DEVICE}" bs=1024 seek=8 conv=notrunc
#}


# For now: do NOT try to write any bootloader bits
write_uboot_platform() {
    local BOOTLOADER="$1"
    local DEVICE="$2"
    echo "Skipping U-Boot write for ${DEVICE} (using existing bootloader)"
    return 0
}
