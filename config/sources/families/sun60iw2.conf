# config/sources/families/sun60iw2.conf
declare -g LINUXFAMILY="sun60iw2"
BRANCHES="mainline"
ATF_COMPILE='no'

# Disable Armbian’s out-of-tree wireless driver patchset
WIREGUARD="no"
EXTRAWIFI="no"


KERNELDRIVERS="none"

SKIP_EXTRA_DRIVERS="yes"

# Override framework default BOOTBRANCH=tag:master (invalid upstream ref).
# For sun60iw2 mainline builds, fetch U-Boot from the master branch.
if [[ "${BRANCH}" == "mainline" ]]; then
    BOOTSOURCE="https://github.com/u-boot/u-boot.git"
    BOOTBRANCH="branch:master"
    BOOTPATCHDIR="u-boot-sun60iw2"
fi

